<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>إنشاء مشروع | Basirah AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background:
        radial-gradient(circle at top, #172554 0%, #020617 60%);
      color: white;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 24px 50px;

      border-bottom: 1px solid rgba(255,255,255,0.06);

      background: rgba(2,6,23,0.65);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 34px;
      font-weight: 800;
      color: #38bdf8;
    }

    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      margin-left: 24px;
      font-size: 15px;
    }

    .container {
      max-width: 850px;
      margin: 70px auto;
      padding: 0 24px;
    }

    .hero {
      background:
        linear-gradient(135deg,
        rgba(15,23,42,0.92),
        rgba(30,41,59,0.88));

      border-radius: 34px;

      padding: 55px;

      border: 1px solid rgba(255,255,255,0.06);

      box-shadow:
        0 25px 60px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-block;

      background: rgba(56,189,248,0.12);

      color: #38bdf8;

      padding: 10px 18px;

      border-radius: 999px;

      font-size: 14px;
      font-weight: 700;

      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 48px;
      line-height: 1.3;
    }

    .subtitle {
      color: #cbd5e1;
      line-height: 2;
      font-size: 18px;

      margin-bottom: 40px;
    }

    .form-grid {
      display: grid;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;

      padding: 18px;

      border-radius: 16px;

      border: 1px solid rgba(255,255,255,0.08);

      background: rgba(15,23,42,0.8);

      color: white;

      font-size: 15px;
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;

      border-color: #38bdf8;

      box-shadow:
        0 0 0 4px rgba(56,189,248,0.12);
    }

    .create-btn {
      margin-top: 12px;

      background:
        linear-gradient(135deg, #38bdf8, #2563eb);

      color: white;

      border: none;

      padding: 18px;

      border-radius: 18px;

      font-size: 17px;
      font-weight: 800;

      cursor: pointer;

      transition: 0.25s;
    }

    .create-btn:hover {
      transform: translateY(-3px);
    }

    .result-box {
      margin-top: 38px;

      background: rgba(2,6,23,0.75);

      border-radius: 24px;

      padding: 28px;

      border: 1px solid rgba(255,255,255,0.06);

      display: none;
    }

    .result-title {
      font-size: 24px;
      font-weight: 800;

      margin-bottom: 22px;
    }

    .project-id {
      color: #4ade80;
      font-weight: 800;
      font-size: 18px;

      margin-bottom: 20px;
    }

    .code-box {
      background: #020617;

      border-radius: 18px;

      padding: 22px;

      overflow-x: auto;

      font-size: 14px;
      line-height: 2;

      color: #cbd5e1;

      border: 1px solid rgba(255,255,255,0.06);
    }

    .dashboard-link {
      display: inline-flex;

      margin-top: 24px;

      background:
        linear-gradient(135deg, #22c55e, #16a34a);

      color: white;

      text-decoration: none;

      padding: 15px 24px;

      border-radius: 16px;

      font-weight: 800;
    }

    @media (max-width: 768px) {

      .navbar {
        padding: 20px 24px;
      }

      .hero {
        padding: 32px;
      }

      h1 {
        font-size: 36px;
      }

    }

  </style>

</head>

<body>

  <div class="navbar">

    <div class="logo">
      Basirah AI
    </div>

    <div class="nav-links">
      <a href="/index.html">الرئيسية</a>
      <a href="/projects.html">المشاريع</a>
    </div>

  </div>

  <div class="container">

    <div class="hero">

      <div class="badge">
        Create New Project
      </div>

      <h1>
        أنشئ مشروعك خلال دقيقة
      </h1>

      <div class="subtitle">
        أضف مشروعك الجديد، ثم انسخ كود التتبع داخل موقعك
        وابدأ تحليل سلوك المستخدمين فوراً باستخدام Basirah AI.
      </div>

      <div class="form-grid">

        <div class="field">
          <label>اسم المشروع</label>

          <input
            type="text"
            id="projectName"
            placeholder="مثال: متجر الإلكترونيات">
        </div>

        <div class="field">
          <label>رابط الموقع</label>

          <input
            type="text"
            id="projectUrl"
            placeholder="https://example.com">
        </div>

        <div class="field">
          <label>نوع المشروع</label>

          <select id="projectType">
            <option>متجر إلكتروني</option>
            <option>شركة خدمات</option>
            <option>منصة تعليمية</option>
            <option>مدونة</option>
            <option>موقع شخصي</option>
          </select>
        </div>

        <button class="create-btn" onclick="generateProject()">
          إنشاء المشروع
        </button>

      </div>

      <div class="result-box" id="resultBox">

        <div class="result-title">
          تم إنشاء المشروع بنجاح
        </div>

        <div class="project-id" id="projectIdText"></div>

        <div class="code-box" id="trackerCode"></div>

        <a id="dashboardLink"
           class="dashboard-link"
           href="#">
          فتح لوحة التحكم
        </a>

      </div>

    </div>

  </div>

  <script>

    function generateProject() {

      const name =
        document.getElementById("projectName").value.trim();

      if (!name) {
        alert("أدخل اسم المشروع");
        return;
      }

      const projectId =
        name
          .toLowerCase()
          .replace(/\s+/g, "_")
          .replace(/[^\w]/g, "") +
        "_" +
        Math.floor(Math.random() * 1000);

      document.getElementById("resultBox").style.display = "block";

      document.getElementById("projectIdText").innerText =
        "Project ID: " + projectId;

      document.getElementById("trackerCode").innerText =
      `<script src="https://basirah-analytics.onrender.com/tracker.js"
      data-project-id="${projectId}">
      <\/script>`;

      document.getElementById("dashboardLink").href =
        "/dashboard.html?project=" + projectId;

    }

  </script>

</body>
</html>
